name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: build
        run: cargo build --verbose

      - name: test
        run: cargo test --verbose

      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: fmt
        run: cargo fmt -- --check

      - name: python dependencies
        run: python -m pip install -r probes/requirements.txt

      - name: python smoke
        run: |
          python -m compileall -q probes stimuli scripts
          python probes/run_probe_matrix.py --model smoke:dummy.gguf --templates en_zero --positions last --generate-tokens 1 --dry-run
          python probes/test_probe_workflows.py
